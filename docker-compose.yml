# Teste local (pré-produção): PostgreSQL + API + frontend estático (Nginx).
# Uso: na raiz do repositório →  docker compose up --build
#
# Produção: modelo com segredos obrigatórios → docker-compose.prod.yml
#   (veja env.production.example e blum_backend/.env.example)
#
# Abra no PC: http://localhost:8080
# No telefone (mesma rede Wi‑Fi): http://<IP_DO_PC>:8080  (ex.: ipconfig / ifconfig)
# A API é servida pelo mesmo host (/api/v2 via Nginx → backend), não use localhost:3011 no build.
#
# Utilizadores iniciais: criados automaticamente na primeira subida (base vazia).
# Opcional — sincronizar só os que faltam da lista padrão:
#   docker compose exec backend node migrations/create-users.js
# Novos vendedores: pela app (admin → Equipe), não pelo script.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blum
      POSTGRES_PASSWORD: blum_docker_dev
      POSTGRES_DB: blum
    volumes:
      - blum_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blum -d blum"]
      interval: 5s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./blum_backend
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: development
      PORT: "3011"
      DATABASE_URL: postgresql://blum:blum_docker_dev@postgres:5432/blum
      JWT_SECRET: ${JWT_SECRET:-blum_docker_jwt_change_before_production}
      FRONTEND_URL: http://localhost:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./blum_frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/v2
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  blum_pgdata:
